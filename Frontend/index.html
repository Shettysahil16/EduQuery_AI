<style>
  #initial-loader {
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: white;
  }

  .spinner {
    width: 40px;
    height: 40px;
    border: 4px solid #ddd;
    border-top: 4px solid #000;
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
